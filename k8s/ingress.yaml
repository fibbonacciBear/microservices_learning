apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pizza-shop
  annotations:
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$1
spec:
  ingressClassName: nginx
  rules:
    - host: pizza.local
      http:
        paths:
          - path: /api/(menu.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: menu-service
                port:
                  number: 80
          - path: /api/(orders.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: order-service
                port:
                  number: 80
          - path: /api/(kitchen.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kitchen-service
                port:
                  number: 80
          - path: /api/(notifications.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: notification-service
                port:
                  number: 80
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - http:
        paths:
          - path: /api/(menu.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: menu-service
                port:
                  number: 80
          - path: /api/(orders.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: order-service
                port:
                  number: 80
          - path: /api/(kitchen.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: kitchen-service
                port:
                  number: 80
          - path: /api/(notifications.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: notification-service
                port:
                  number: 80
          - path: /(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
